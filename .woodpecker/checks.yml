when:
  - event: [push, pull_request]
    branch: main

steps:
  - name: commit message
    image: codeberg.org/koibtw/commits:latest
    commands:
      - check-commit-message "$(git log -1 --pretty=%B)"
  - name: formatting
    image: nixos/nix
    commands:
      - echo 'experimental-features = flakes nix-command' >> /etc/nix/nix.conf
      - nix fmt   --inputs-from .
      - nix shell --inputs-from . nixpkgs#git nixpkgs#gnugrep nixpkgs#gawk -c git diff -- . \
        "\$(grep filter=lfs .gitattributes | awk '{print :(exclude) \$1}')"
